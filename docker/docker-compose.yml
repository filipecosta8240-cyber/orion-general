# ORION System - Docker Compose for Production
# Complete stack with monitoring and caching

version: '3.8'

services:
  # ORION Main Service
  orion:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: orion-system
    restart: unless-stopped
    ports:
      - "8000:8000"  # Main API
      - "8001:8001"  # MCP Server
    volumes:
      - orion_data:/app/data
      - orion_logs:/app/logs
      - ../ORION_SYSTEM:/app/ORION_SYSTEM  # Memory vault
    environment:
      - ORION_ENV=production
      - ORION_LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://orion:orion@postgres:5432/orion
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - orion-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: orion-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orion-network

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: orion-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=orion
      - POSTGRES_USER=orion
      - POSTGRES_PASSWORD=orion
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orion"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orion-network

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: orion-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - orion-network

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: orion-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    networks:
      - orion-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: orion-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - orion
    networks:
      - orion-network

volumes:
  orion_data:
  orion_logs:
  redis_data:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  orion-network:
    driver: bridge
