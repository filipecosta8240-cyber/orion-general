<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ORION General Agent</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .header h1 {
            font-size: 1.2rem;
            color: #4ade80;
        }

        .header .status {
            font-size: 0.8rem;
            color: #888;
            margin-top: 5px;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.4;
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: #4ade80;
            color: #000;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            align-self: flex-start;
            background: rgba(255,255,255,0.1);
            border-bottom-left-radius: 4px;
        }

        .message.bot.loading {
            color: #888;
        }

        .input-container {
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 10px;
        }

        .input-container input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 24px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        .input-container input::placeholder {
            color: #666;
        }

        .input-container button {
            padding: 12px 20px;
            border: none;
            border-radius: 24px;
            background: #4ade80;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .input-container button:active {
            transform: scale(0.95);
        }

        .quick-actions {
            display: flex;
            gap: 8px;
            padding: 10px 15px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .quick-actions button {
            flex-shrink: 0;
            padding: 8px 14px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            background: transparent;
            color: #4ade80;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .quick-actions button:active {
            background: rgba(74, 222, 128, 0.2);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎖️ ORION GENERAL</h1>
        <div class="status" id="status">● Conectando...</div>
    </div>

    <div class="chat-container" id="chat">
        <div class="message bot">
            General operacional. Versão 5.0.<br><br>
            Modos disponíveis:<br>
            • [DEEP DIVE] Auditoria<br>
            • [URGENTE] Diagnóstico rápido<br>
            • [ANALISAR] Análise detalhada<br>
            • [COMPARAR] Comparação<br>
            • [RISCOS] Foco em riscos<br>
            • [RESUMIR] Resumo<br>
            • [PESQUISAR] Web<br>
            • [MEMORIA] Consultar memória
        </div>
    </div>

    <div class="quick-actions">
        <button onclick="sendQuick('[DEEP DIVE] ')">DEEP DIVE</button>
        <button onclick="sendQuick('[URGENTE] ')">URGENTE</button>
        <button onclick="sendQuick('[ANALISAR] ')">ANALISAR</button>
        <button onclick="sendQuick('[COMPARAR] ')">COMPARAR</button>
        <button onclick="sendQuick('[RISCOS] ')">RISCOS</button>
        <button onclick="sendQuick('[RESUMIR] ')">RESUMIR</button>
        <button onclick="sendQuick('[PESQUISAR] ')">PESQUISAR</button>
        <button onclick="sendQuick('[MEMORIA] ')">MEMÓRIA</button>
    </div>

    <div class="input-container">
        <input type="text" id="userInput" placeholder="Escreva a sua mensagem..." autocomplete="off">
        <button onclick="sendMessage()">Enviar</button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('userInput');
        const status = document.getElementById('status');
        const MCP_URL = window.location.origin + '/api/chat';

        // Verificar conexão
        async function checkConnection() {
            try {
                const res = await fetch('/api/health');
                if (res.ok) {
                    status.textContent = '● Conectado';
                    status.style.color = '#4ade80';
                } else {
                    status.textContent = '● Erro de conexão';
                    status.style.color = '#f87171';
                }
            } catch (e) {
                status.textContent = '● Servidor indisponível';
                status.style.color = '#f87171';
            }
        }

        function addMessage(text, isUser = false) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'bot'}`;
            div.innerHTML = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function addLoading() {
            const div = document.createElement('div');
            div.className = 'message bot loading';
            div.id = 'loading';
            div.textContent = 'A processar...';
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function removeLoading() {
            const loading = document.getElementById('loading');
            if (loading) loading.remove();
        }

        function sendQuick(text) {
            input.value = text;
            sendMessage();
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, true);
            input.value = '';
            addLoading();

            try {
                const res = await fetch(MCP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                const data = await res.json();
                removeLoading();
                addMessage(data.response || 'Sem resposta');
            } catch (e) {
                removeLoading();
                addMessage('Erro de conexão com o servidor.');
            }
        }

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        checkConnection();
        setInterval(checkConnection, 30000);
    </script>
</body>
</html>
