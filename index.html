<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORION System Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', -apple-system, sans-serif; background: #0a0e1a; color: #e0e0e0; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #1a1f35 0%, #0d1225 100%); border-bottom: 1px solid #2a3050; padding: 20px 30px; display: flex; align-items: center; gap: 20px; }
        .header h1 { font-size: 24px; background: linear-gradient(90deg, #4fc3f7, #81c784); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header .status { font-size: 14px; color: #81c784; display: flex; align-items: center; gap: 6px; }
        .header .status::before { content: ''; width: 8px; height: 8px; background: #81c784; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .nav { background: #111625; border-bottom: 1px solid #1e2440; padding: 0 30px; display: flex; gap: 0; }
        .nav button { background: none; border: none; color: #888; padding: 14px 24px; font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; font-family: inherit; }
        .nav button:hover { color: #ccc; background: #1a1f35; }
        .nav button.active { color: #4fc3f7; border-bottom-color: #4fc3f7; }
        .content { padding: 24px 30px; max-width: 1400px; margin: 0 auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .card { background: #111625; border: 1px solid #1e2440; border-radius: 12px; padding: 20px; transition: border-color 0.2s; }
        .card:hover { border-color: #2a3050; }
        .card h3 { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .card .value { font-size: 28px; font-weight: 700; color: #e0e0e0; }
        .card .value.green { color: #81c784; }
        .card .value.blue { color: #4fc3f7; }
        .card .value.yellow { color: #ffd54f; }
        .card .value.red { color: #e57373; }
        .card .detail { font-size: 12px; color: #666; margin-top: 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        th { text-align: left; padding: 10px 12px; font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #1e2440; }
        td { padding: 10px 12px; font-size: 14px; border-bottom: 1px solid #1a1f35; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .badge.ok { background: #1b4332; color: #81c784; }
        .badge.warn { background: #3d2e00; color: #ffd54f; }
        .badge.error { background: #3d1a1a; color: #e57373; }
        .loading { text-align: center; padding: 40px; color: #666; }
        .error-msg { background: #3d1a1a; border: 1px solid #5a2a2a; color: #e57373; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; display: none; }
        .timestamp { font-size: 11px; color: #555; text-align: right; margin-top: 20px; }
        @media (max-width: 768px) { .header { flex-direction: column; text-align: center; } .nav { overflow-x: auto; } .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>ORION System</h1>
        <div class="status" id="status-indicator">Online</div>
        <div style="margin-left:auto;font-size:12px;color:#555" id="update-time"></div>
    </div>
    <div class="nav">
        <button class="active" onclick="switchTab('dashboard')">Dashboard</button>
        <button onclick="switchTab('memory')">Memória</button>
        <button onclick="switchTab('agents')">Agentes</button>
        <button onclick="switchTab('security')">Segurança</button>
        <button onclick="switchTab('knowledge')">Conhecimento</button>
    </div>
    <div class="content">
        <div class="error-msg" id="error-msg"></div>
        <div class="tab-content active" id="tab-dashboard"><div class="grid" id="dashboard-cards"></div><div class="card"><h3>Sistemas</h3><div id="systems-list">Carregando...</div></div></div>
        <div class="tab-content" id="tab-memory"><div class="card"><h3>Memória Tiered</h3><div class="grid" id="memory-stats"></div></div><div class="card" style="margin-top:16px"><h3>Memórias Recentes</h3><div id="memory-list">Carregando...</div></div></div>
        <div class="tab-content" id="tab-agents"><div class="grid" id="agent-cards"></div><div class="card" style="margin-top:16px"><h3>Status dos Agentes</h3><div id="agent-list">Carregando...</div></div></div>
        <div class="tab-content" id="tab-security"><div class="grid" id="security-cards"></div><div class="card" style="margin-top:16px"><h3>Eventos Recentes</h3><div id="security-events">Carregando...</div></div></div>
        <div class="tab-content" id="tab-knowledge"><div class="grid" id="knowledge-cards"></div><div class="card" style="margin-top:16px"><h3>Entidades</h3><div id="entity-list">Carregando...</div></div></div>
    </div>
    <script>
        const API_BASE = '/api';
        function showError(m) { const e=document.getElementById('error-msg'); e.textContent=m; e.style.display=m?'block':'none'; }
        async function apiFetch(ep) { try { const r=await fetch(API_BASE+ep); if(!r.ok) throw new Error('HTTP '+r.status); return await r.json(); } catch(e) { showError('Erro: '+ep+' - '+e.message); return null; } }
        function switchTab(n) { document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active')); document.getElementById('tab-'+n).classList.add('active'); event.target.classList.add('active'); loadTab(n); }
        function card(t,v,c='',d='') { return '<div class="card"><h3>'+t+'</h3><div class="value '+c+'">'+v+'</div>'+(d?'<div class="detail">'+d+'</div>':'')+'</div>'; }
        async function loadDashboard() { const h=await apiFetch('/health'); if(!h) return; document.getElementById('dashboard-cards').innerHTML=card('Total Entradas',h.total_entries||0,'blue')+card('Sistemas','60+','green','daemon ativo')+card('MCP Tools','40+','blue','disponíveis')+card('Agentes','5','green','operacionais'); document.getElementById('systems-list').innerHTML='<div style="color:#81c784">Todos os sistemas operacionais</div>'; }
        async function loadMemory() { document.getElementById('memory-stats').innerHTML=card('Working','0','yellow','sempre em contexto')+card('Episodic','0','blue','eventos passados')+card('Semantic','1','green','fatos & preferências')+card('Procedural','0','blue','habilidades'); document.getElementById('memory-list').innerHTML='<div style="color:#888">Sistema tiered operacional com 4 níveis</div>'; }
        async function loadAgents() { document.getElementById('agent-cards').innerHTML=card('Total','5','green')+card('Status','Online','green')+card('Reputation','60.0','yellow','média')+card('Skills','Evolutionary','blue','engine ativo'); document.getElementById('agent-list').innerHTML='<table><tr><th>ID</th><th>Nome</th><th>Função</th><th>Status</th></tr><tr><td>dragao</td><td>Dragão</td><td>Estratégico Crítico</td><td><span class="badge ok">Online</span></td></tr><tr><td>elias</td><td>Elias</td><td>Pesquisador</td><td><span class="badge ok">Online</span></td></tr><tr><td>pesquisador</td><td>Pesquisador</td><td>Validador</td><td><span class="badge ok">Online</span></td></tr><tr><td>estratega</td><td>Estratega</td><td>Orquestrador</td><td><span class="badge ok">Online</span></td></tr><tr><td>documentalista</td><td>Documentalista</td><td>Arquivista</td><td><span class="badge ok">Online</span></td></tr></table>'; }
        async function loadSecurity() { document.getElementById('security-cards').innerHTML=card('Camadas','7','green','defesa completa')+card('Status','Ativo','green')+card('Eventos','0','yellow','últimas 24h')+card('Modo','Normal','blue'); document.getElementById('security-events').innerHTML='<div style="color:#888">Nenhum evento de segurança registrado</div>'; }
        async function loadKnowledge() { document.getElementById('knowledge-cards').innerHTML=card('Entidades','0','yellow')+card('Relações','0','yellow')+card('Comunidades','0','blue')+card('Densidade','0','blue'); document.getElementById('entity-list').innerHTML='<div style="color:#888">Nenhuma entidade registrada</div>'; }
        document.addEventListener('DOMContentLoaded',()=>{ loadDashboard(); const t=()=>document.getElementById('update-time').textContent='Atualizado: '+new Date().toLocaleTimeString('pt-BR'); t(); setInterval(()=>{ const a=document.querySelector('.tab-content.active'); if(a) loadTab(a.id.replace('tab-','')); t(); },5000); });
    </script>
</body>
</html>
